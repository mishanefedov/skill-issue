name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun test
      - run: bun run typecheck
      # The committed Node bundle must match the source (it ships in the plugin
      # so the launcher runs without Bun). Fail if someone forgot to rebuild.
      - run: bun run build
      - run: git diff --exit-code dist/skill-issue.mjs || (echo "dist/skill-issue.mjs is stale — run 'bun run build' and commit it" && exit 1)
      # Dogfood: the launcher audits its own bundled skill on Node (no error).
      - run: node dist/skill-issue.mjs skills
